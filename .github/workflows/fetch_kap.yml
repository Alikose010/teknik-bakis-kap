name: KAP Bildirim Toplayıcı

on:
  schedule:
    - cron: '*/10 * * * *'   # Her 10 dakikada bir
  workflow_dispatch:            # Manuel tetikleme

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu klonla
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: KAP bildirimlerini çek
        run: python scraper/fetch_kap.py

      - name: JSON dosyasını commit et
        run: |
          git config --local user.email "kap-bot@teknikbakis.app"
          git config --local user.name "KAP Bot"
          git add data/kap_news.json
          git diff --staged --quiet && echo "Değişiklik yok" || git commit -m "chore: KAP güncellendi $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
